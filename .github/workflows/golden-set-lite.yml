name: golden-set-lite

# Tier B: Run 5 sentinel companies against ground truth.
# Triggers on PRs that touch knowledge layers or prompts.
# Requires ANTHROPIC_API_KEY secret.

on:
  pull_request:
    paths:
      - 'src/data/**'
      - 'src/App.jsx'
      - 'tests/golden-set/**'
  workflow_dispatch: {}

jobs:
  golden-set-lite:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run golden-set lite
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node tests/golden-set/run.js

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: golden-set-report
          path: tests/golden-set/reports/
          retention-days: 30
